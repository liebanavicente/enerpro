<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENERPRO — Acceso al portal</title>
  <link rel="icon" href="enerprologo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 70% 55% at 5% 95%, rgba(120,80,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 45% at 95% 5%, rgba(212,157,0,0.1) 0%, transparent 55%),
        #0f1117;
      color: #f0f1ff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem 1rem;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #ffffff;
      border-radius: 14px;
      border-top: 2px solid #f5b800;
      box-shadow: 0 20px 48px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.04);
      width: 100%; max-width: 420px;
      padding: 2.25rem 2rem 2rem;
      color: #111827;
    }
    .logo-row {
      display: flex; align-items: center; gap: 0.875rem;
      margin-bottom: 1.5rem;
    }
    .logo-row img { width: 40px; height: 40px; border-radius: 8px; }
    .brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.35rem; font-weight: 800; letter-spacing: 0.1em;
      color: #111827;
    }
    .brand span { color: #f5b800; }
    h1 {
      font-size: 1.05rem; font-weight: 700; color: #111827;
      margin-bottom: 0.75rem; letter-spacing: -0.01em;
    }
    .sub { font-size: 0.85rem; color: #6b7280; line-height: 1.6; margin-bottom: 1.5rem; }
    .info-box {
      background: rgba(245,184,0,0.08);
      border: 1px solid rgba(245,184,0,0.25);
      border-radius: 8px;
      padding: 1rem 1.125rem;
      font-size: 0.82rem;
      color: #374151;
      line-height: 1.55;
    }
    .btn-link {
      display: block; width: 100%; padding: 0.875rem;
      background: #f5b800; color: #000;
      border: none; border-radius: 8px;
      font-size: 0.9375rem; font-weight: 700;
      text-align: center; text-decoration: none;
      margin-top: 1.5rem;
      transition: background 0.18s, transform 0.18s;
    }
    .btn-link:hover { background: #e6ad00; transform: translateY(-1px); }
    .back-link {
      display: block; text-align: center; margin-top: 1.25rem;
      font-size: 0.78rem; color: rgba(240,241,255,0.5);
      text-decoration: none; transition: color 0.15s;
    }
    .back-link:hover { color: rgba(240,241,255,0.8); }
    @media (max-width: 767px) {
      body { padding: 1rem 0.875rem; padding-top: calc(1rem + env(safe-area-inset-top, 0px)); justify-content: flex-start; padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px)); }
      .card { padding: 1.75rem 1.25rem 1.5rem; max-width: none; }
      .btn-link { min-height: 48px; font-size: 1rem; line-height: 1.2; display: flex; align-items: center; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-row">
    <img src="enerprologo.jpg" alt="ENERPRO">
    <div>
      <div class="brand">ENER<span>PRO</span></div>
    </div>
  </div>

  <h1 id="regTitle">Alta gestionada por coordinación</h1>
  <p class="sub" id="regSub">El acceso al portal lo crea tu coordinador. Si aún no tienes cuenta, contacta con él directamente.</p>
  <div class="info-box" id="regInfo">
    Cuando el coordinador te dé de alta, recibirás un email con un enlace para establecer tu contraseña e iniciar sesión.
  </div>
  <a href="/" class="btn-link" id="regBtnLogin">Ir al acceso</a>
</div>

<a href="/" class="back-link" id="regBack">← Volver al acceso</a>

<script>
(function() {
  var lang = localStorage.getItem('enerpro_lang') || 'es';
  var copy = {
    es: {
      title: 'Alta gestionada por coordinación',
      sub: 'El acceso al portal lo crea tu coordinador. Si aún no tienes cuenta, contacta con él directamente.',
      info: 'Cuando el coordinador te dé de alta, recibirás un email con un enlace para establecer tu contraseña e iniciar sesión.',
      btn: 'Ir al acceso',
      back: '← Volver al acceso'
    },
    ca: {
      title: 'Alta gestionada per coordinació',
      sub: "L'accés al portal el crea el teu coordinador. Si encara no tens compte, contacta amb ell directament.",
      info: "Quan el coordinador et doni d'alta, rebràs un correu amb un enllaç per establir la contrasenya i iniciar sessió.",
      btn: "Anar a l'accés",
      back: "← Tornar a l'accés"
    }
  };
  var c = copy[lang] || copy.es;
  document.getElementById('regTitle').textContent = c.title;
  document.getElementById('regSub').textContent = c.sub;
  document.getElementById('regInfo').textContent = c.info;
  document.getElementById('regBtnLogin').textContent = c.btn;
  document.getElementById('regBack').textContent = c.back;
})();
</script>
</body>
</html>
